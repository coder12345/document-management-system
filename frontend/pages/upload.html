<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload — DocVault</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-base);
        }

        .upload-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 48px;
            width: 100%;
            max-width: 460px;
            animation: cardIn 0.4s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .upload-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .upload-icon-wrap {
            width: 40px;
            height: 40px;
            background: var(--accent-glow);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .upload-icon-wrap svg {
            width: 22px;
            height: 22px;
            fill: var(--accent-light);
        }

        .upload-title {
            font-family: var(--font-display);
            font-size: 22px;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .drop-zone {
            border: 2px dashed var(--border-strong);
            border-radius: var(--radius-md);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            margin-bottom: 8px;
            background: var(--bg-input);
            position: relative;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .drop-zone-icon {
            width: 44px;
            height: 44px;
            margin: 0 auto 12px;
            background: var(--bg-hover);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .drop-zone-icon svg {
            width: 24px;
            height: 24px;
            fill: var(--text-muted);
        }

        .drop-zone p {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .drop-zone span {
            font-size: 12px;
            color: var(--text-muted);
            display: block;
            margin-top: 4px;
        }

        #file-name-display {
            font-size: 13px;
            color: var(--accent-light);
            font-weight: 500;
            margin-bottom: 20px;
            min-height: 20px;
            text-align: center;
        }

        .btn-primary {
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            padding: 12px 20px;
            width: 100%;
            cursor: pointer;
            transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
            margin-bottom: 10px;
        }

        .btn-primary:hover {
            background: var(--accent-light);
            box-shadow: 0 4px 20px rgba(124,110,245,0.4);
            transform: translateY(-1px);
        }

        .btn-secondary {
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-card);
            border: 1.5px solid var(--border-strong);
            border-radius: var(--radius-sm);
            padding: 11px 20px;
            width: 100%;
            cursor: pointer;
            transition: all var(--transition);
        }

        .btn-secondary:hover {
            border-color: var(--accent-border);
            color: var(--accent-light);
            background: var(--bg-hover);
        }
    </style>
</head>
<body>

<div class="upload-card">
    <div class="upload-header">
        <div class="upload-icon-wrap">
            <svg viewBox="0 0 24 24"><path d="M19.35 10.04A7.49 7.49 0 0 0 12 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 0 0 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
        </div>
        <h1 class="upload-title">Upload document</h1>
    </div>

    <form id="uploadForm">
        <div class="drop-zone" id="dropZone">
            <input id="fileInput" type="file" name="file">
            <div class="drop-zone-icon">
                <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg>
            </div>
            <p>Click or drag file here</p>
            <span>Any file type supported</span>
        </div>
        <div id="file-name-display"></div>
        <input id="uploadButton" type="submit" class="btn-primary" value="Upload file">
    </form>

    <button id="backButton" class="btn-secondary">← Back to dashboard</button>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const display = document.getElementById('file-name-display');
    const dropZone = document.getElementById('dropZone');

    fileInput.addEventListener('change', () => {
        if (fileInput.files[0]) display.textContent = '✓ ' + fileInput.files[0].name;
    });
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files[0]) {
            fileInput.files = e.dataTransfer.files;
            display.textContent = '✓ ' + e.dataTransfer.files[0].name;
        }
    });
</script>
<script src="../js/upload.js"></script>
</body>
</html>
